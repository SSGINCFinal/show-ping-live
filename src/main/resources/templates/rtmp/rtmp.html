<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout.html">
<div layout:fragment="content">
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/rtmp/rtmp.css">
    <link rel="stylesheet" href="/webjars/ekko-lightbox/5.2.0/dist/ekko-lightbox.css">
    
    <script src="/webjars/jquery/3.7.1/dist/jquery.js"></script>
    <script src="/webjars/bootstrap/5.3.3/dist/js/bootstrap.min.js"></script>
    <script src="/webjars/ekko-lightbox/5.2.0/dist/ekko-lightbox.min.js"></script>
    
    <div class="container">
        <div class="live-container">
            <div class="video-wrapper">
                <video id="video" autoplay playsinline></video>
            </div>
        </div>
        <div class="chat-container">
            <div id="chat">
                <h1>채팅화면</h1>
            </div>
        </div>
        <div class="product-container">
            <div id="product">
                <h1>상품화면</h1>
            </div>
        </div>
    </div>
    
    <br>
    <div class="container">
        <div class="settings-buttons">
            <div>
                <button id="start" class="btn btn-success">
                    <span class="glyphicon glyphicon-play"></span>송출시작</button>
                <button id="viewer" class="btn btn-primary">
                    <span class="glyphicon glyphicon-user"></span>방송시청</button>
                <button id="stop" href="#" class="btn btn-danger">
                    <span class="glyphicon glyphicon-stop"></span>송출종료</button>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/rtmp/rtmp.js}"></script>
</div>
</html>
