<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout.html">
<div layout:fragment="content">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/dist/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/rtmp/rtmp.css}">
    <link rel="stylesheet" th:href="@{/webjars/ekko-lightbox/5.2.0/dist/ekko-lightbox.css}">
    
    <script th:src="@{/webjars/jquery/3.7.1/dist/jquery.js}"></script>
    <script th:src="@{/webjars/bootstrap/5.3.3/dist/js/bootstrap.min.js}"></script>
    <script th:src="@{/webjars/ekko-lightbox/5.2.0/dist/ekko-lightbox.min.js}"></script>
    
    
    <div class="container">
        <div class="live-container">
            <div class="video-wrapper">
                <video id="video" muted autoplay></video>
            </div>
        </div>
        <div class="chat-container">
            <div id="chat">
                <h1>채팅화면</h1>
            </div>
        </div>
        <div class="product-container">
            <div id="product">
                <h1>상품화면</h1>
            </div>
        </div>
    </div>
    
    <script th:src="@{https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js}"></script>
    
    <script th:src="@{/js/rtmp/rtmpView.js}"></script>
</div>
</html>
